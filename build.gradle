plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
    withSourcesJar()
}

repositories {
    mavenCentral()
    maven {
        name = 'Curse Maven'
        url = 'https://cursemaven.com'
        content { includeGroup 'curse.maven' }
    }
}

neoForge {
    version = neoforge_version

    if (parchment_version?.trim() && parchment_mc_version?.trim()) {
        parchment {
            mappingsVersion = parchment_version
            minecraftVersion = parchment_mc_version
        }
    }

    runs {
        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            systemProperty 'forge.logging.console.level', 'debug'
        }
        client {
            client()
            programArguments.addAll '--username', 'Dev'
        }
        server {
            server()
            programArgument '--nogui'
        }
        gameTestServer {
            type = 'gameTestServer'
        }
        data {
            data()
            programArguments.addAll(
                '--mod', mod_id,
                '--all',
                '--output', file('src/generated/resources/').absolutePath,
                '--existing', file('src/main/resources/').absolutePath
            )
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    if (findProperty('ars_nouveau_file')?.toString()?.trim()) {
        implementation "curse.maven:ars-nouveau-${ars_nouveau_project.tokenize('-').last()}:${ars_nouveau_file}"
    }
    if (findProperty('irons_spellbooks_file')?.toString()?.trim()) {
        compileOnly "curse.maven:irons-spells-n-spellbooks-${irons_spellbooks_project.tokenize('-').last()}:${irons_spellbooks_file}"
    }
    if (findProperty('sanctified_file')?.toString()?.trim()) {
        compileOnly "curse.maven:sanctified-legacy-${sanctified_project.tokenize('-').last()}:${sanctified_file}"
    }

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

processResources {
    def replaceProps = [
        minecraft_version: minecraft_version,
        neoforge_version: neoforge_version,
        neoforge_version_range: neoforge_version_range,
        loader_version_range: loader_version_range,
        mod_id: mod_id, mod_name: mod_name,
        mod_license: mod_license, mod_version: mod_version,
        mod_authors: mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProps
    filesMatching(['META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
        expand replaceProps
    }
}

jar {
    manifest {
        attributes(
            'Specification-Title'      : mod_id,
            'Specification-Vendor'     : mod_authors,
            'Specification-Version'    : '1',
            'Implementation-Title'     : project.name,
            'Implementation-Version'   : project.jar.archiveVersion,
            'Implementation-Vendor'    : mod_authors,
            'Implementation-Timestamp' : new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        )
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}
