name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache ForgeGradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/forge_gradle
            build/forge
          key: forgegradle-${{ runner.os }}-${{ hashFiles('gradle.properties', 'build.gradle') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile
        run: ./gradlew compileJava --no-daemon --stacktrace

      - name: Test
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/reports/tests/test
            build/test-results/test

  # GameTests run as a separate job because they are slower and require the
  # full ForgeGradle environment. This job runs the Iron's-LESS profile
  # (Iron's is compileOnly, so it is absent from the run classpath) and is
  # BLOCKING (audit E7): it proves the dedicated-server fallback path boots
  # and all required GameTests pass without Iron's installed. The
  # Iron's-loaded profile (-PwithIronsRuntimeGameTests) remains a local/manual
  # run because it needs the CurseMaven runtime jars.
  gametest:
    name: GameTest server (Iron's-less)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run GameTest server
        run: ./gradlew runGameTestServer --no-daemon --stacktrace

      # runGameTestServer exits 0 / BUILD SUCCESSFUL even when the server
      # crashes at boot, so the gradle exit code alone proves nothing — the
      # log line "All N required tests passed" is the real success signal.
      - name: Verify GameTest results
        run: |
          if ! grep -q "required tests passed" run/logs/latest.log; then
            echo "::error::GameTest server did not report success (boot crash or test failure)"
            tail -n 80 run/logs/latest.log || true
            exit 1
          fi
          grep "required tests passed" run/logs/latest.log

      - name: Upload GameTest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gametest-logs
          path: run/logs
