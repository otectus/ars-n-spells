modLoader="javafml"
loaderVersion="[47,)"
license="GNU GPLv3"
issueTrackerURL="https://github.com/otectus/ars-n-spells/issues"

[[mods]]
modId="ars_n_spells"
version="${version}"
displayName="Ars 'n' Spells"
displayURL="https://github.com/otectus/ars-n-spells"
updateJSONURL="https://raw.githubusercontent.com/otectus/ars-n-spells/main/update.json"
description='''
Bridges Ars Nouveau and Iron's Spells 'n Spellbooks: unified mana with five
modes, cross-mod spell scaling, school affinity and progression, resonance
bonuses, optional unified cooldowns, custom rituals (Mana Infusion, Mana Well),
and cross-cast inscription via the Spell Transcription ritual. Export Ars
spells onto Iron's scrolls and bind them into Iron's spellbooks (3.0.0).
Optional Covenant of the Seven integration adds LP and aura casting via the
Ring of Seven Curses/Virtues. Graceful fallback if Iron's is uninstalled.
'''
authors="otectus"

[[dependencies.ars_n_spells]]
modId="forge"
mandatory=true
versionRange="[47,)"
ordering="NONE"
side="BOTH"

[[dependencies.ars_n_spells]]
modId="minecraft"
mandatory=true
versionRange="[1.20.1]"
ordering="NONE"
side="BOTH"

[[dependencies.ars_n_spells]]
modId="ars_nouveau"
mandatory=true
versionRange="[4.12.7,4.13)"
ordering="AFTER"
side="BOTH"

# ANS-MED-038: version range loosened to [3.15.0, 4.0.0) so 3.16+ Iron's releases
# within 1.20.1 are not blocked. The compile-time pin (gradle.properties) controls
# what we build against; the runtime range is what FML enforces at load.
[[dependencies.ars_n_spells]]
modId="irons_spellbooks"
mandatory=false
versionRange="[1.20.1-3.15.0,1.20.1-4.0.0)"
ordering="AFTER"
side="BOTH"